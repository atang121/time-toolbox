<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长链接转短链接 - 时光工具箱</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="logo" style="font-family: 'Noto Serif SC', serif; font-size: 1.5rem; color: #d4af37;">
            <i class="fas fa-hourglass-half"></i> 时光工具箱
        </div>
        <button class="share-nav-btn" onclick="shareCurrentTool()" title="分享此工具">
            <i class="fas fa-share-alt"></i>
        </button>
        <button class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <button class="close-menu" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </button>
            <a href="../index.html" class="nav-link">首页</a>
            <a href="days-diff.html" class="nav-link">相隔天数计算</a>
            <a href="date-calc.html" class="nav-link">日期加减推算</a>
            <a href="age-calc.html" class="nav-link">年龄计算</a>
            <a href="lunar-convert.html" class="nav-link">农历阳历转换</a>
            <a href="rmb-convert.html" class="nav-link">人民币小写改大写</a>
            <a href="exchange-rate.html" class="nav-link">实时汇率换算</a>
            <a href="short-url.html" class="nav-link active">长链接转短链接</a>
            <a href="qrcode.html" class="nav-link">网址转二维码</a>
            <a href="image-convert.html" class="nav-link">图片格式转换</a>
            <a href="image-compress.html" class="nav-link">图片压缩</a>
            <a href="batch-rename.html" class="nav-link">图片或文件批量改名</a>
        </div>
        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    </nav>

    <!-- 主内容区域 -->
    <main style="position: relative; z-index: 10; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 5rem 1rem 2rem;">
        <div class="animate-fade-in form-container" style="max-width: 550px; width: 100%; padding: 2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size: clamp(1.3rem, 5vw, 2rem); margin-bottom: 0.5rem; color: #d4af37; font-family: 'Noto Serif SC', serif;">
                <i class="fas fa-compress-alt"></i> 长链接转短链接
            </h1>
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem;">
                将冗长的网址转换为简短链接
            </p>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">输入长链接</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: #d4af37; font-size: 0.9rem; pointer-events: none;">
                        <i class="fas fa-link"></i>
                    </span>
                    <input type="url" id="urlInput" placeholder="https://example.com/your-long-url" 
                           style="padding-left: 2.2rem; font-size: 0.95rem;">
                </div>
            </div>

            <button class="btn-primary" onclick="generateShortUrl()">
                <i class="fas fa-compress-alt"></i> 生成短链接
            </button>

            <!-- 短链接结果 -->
            <div id="shortUrlResult" class="result-display" style="display: none;">
                <div style="text-align: center;">
                    <div id="shortUrlLabel" style="font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem;">
                        短链接
                    </div>
                    <div id="shortUrlContent" style="font-size: 1.2rem; color: #d4af37; font-weight: bold; margin: 0.5rem 0; word-break: break-all;">
                    </div>
                    <div id="shortUrlActions" style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem;">
                        <button onclick="copyShortUrl()" class="action-btn">
                            <i class="fas fa-copy"></i> 复制
                        </button>
                        <button onclick="openShortUrl()" class="action-btn">
                            <i class="fas fa-external-link-alt"></i> 打开
                        </button>
                    </div>
                </div>
            </div>

            <!-- 快捷示例 -->
            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <div style="font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 0.5rem;">快捷示例</div>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    <button onclick="setExampleUrl('https://www.baidu.com')" class="quick-btn">百度</button>
                    <button onclick="setExampleUrl('https://www.google.com')" class="quick-btn">Google</button>
                    <button onclick="setExampleUrl('https://github.com')" class="quick-btn">GitHub</button>
                    <button onclick="setExampleUrl('https://www.bilibili.com')" class="quick-btn">B站</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 交互提示 -->
    <div class="hint-system">
        <i class="fas fa-lightbulb"></i> 输入长链接，一键生成短链接便于分享
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-handle">
            <i class="fas fa-chevron-left" style="color: rgba(255,255,255,0.5);"></i>
        </div>
        <h3 style="color: #d4af37; margin-bottom: 1.5rem;">使用说明</h3>
        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.8;">
            <p style="margin-bottom: 1rem;"><strong>功能介绍：</strong></p>
            <p>将冗长的URL转换为简短的链接，便于分享和记忆。</p>
            
            <ul style="margin: 1rem 0; padding-left: 1rem;">
                <li style="margin-bottom: 0.5rem;">支持任意有效网址</li>
                <li style="margin-bottom: 0.5rem;">生成后可直接复制</li>
                <li style="margin-bottom: 0.5rem;">短链接永久有效</li>
            </ul>
            
            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">
                    <i class="fas fa-info-circle"></i> 提示：请确保输入完整的网址，包含 http:// 或 https://
                </p>
            </div>
        </div>
    </aside>

    <style>
        body {
            overflow-y: auto !important;
        }
        .quick-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            color: #d4af37;
        }
        .action-btn {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.4);
        }
        .manual-link-btn {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .manual-link-btn:hover {
            background: rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/three-scenes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/share.js"></script>
    <script src="../js/feedback.js"></script>
    <script src="../js/page-specific/short-url.js"></script>
    <script>
        const sceneManager = new SceneManager('canvas-container');
        sceneManager.createShortUrlScene();
        sceneManager.animate();
        
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuOverlay = document.getElementById('menuOverlay');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
        }
    </script>
</body>
</html>
