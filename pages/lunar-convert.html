<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农历阳历转换 - 时光工具箱</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="logo" style="font-family: 'Noto Serif SC', serif; font-size: 1.5rem; color: #d4af37;">
            <i class="fas fa-hourglass-half"></i> 时光工具箱
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <button class="close-menu" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </button>
            <a href="../index.html" class="nav-link">首页</a>
            <a href="days-diff.html" class="nav-link">相隔天数计算</a>
            <a href="date-calc.html" class="nav-link">日期加减推算</a>
            <a href="age-calc.html" class="nav-link">年龄计算</a>
            <a href="lunar-convert.html" class="nav-link active">农历阳历转换</a>
            <a href="rmb-convert.html" class="nav-link">人民币小写改大写</a>
            <a href="short-url.html" class="nav-link">长链接转短链接</a>
            <a href="qrcode.html" class="nav-link">网址转二维码</a>
            <a href="image-convert.html" class="nav-link">图片格式转换</a>
            <a href="batch-rename.html" class="nav-link">图片或文件批量改名</a>
        </div>
        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    </nav>

    <!-- 主内容区域 -->
    <main style="position: relative; z-index: 10; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 5rem 1rem 2rem;">
        <div class="animate-fade-in form-container" style="max-width: 550px; width: 100%; padding: 2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size: clamp(1.3rem, 5vw, 2rem); margin-bottom: 0.5rem; color: #d4af37; font-family: 'Noto Serif SC', serif;">
                <i class="fas fa-moon"></i> 农历阳历转换
            </h1>
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem;">
                农历（阴历）与阳历（公历）相互转换
            </p>

            <!-- 转换方向选择 -->
            <div style="margin-bottom: 1.5rem;">
                <div class="convert-direction-group">
                    <button type="button" class="direction-btn active" data-direction="solar2lunar" onclick="setDirection('solar2lunar')">
                        <i class="fas fa-sun"></i> 阳历 → 农历
                    </button>
                    <button type="button" class="direction-btn" data-direction="lunar2solar" onclick="setDirection('lunar2solar')">
                        <i class="fas fa-moon"></i> 农历 → 阳历
                    </button>
                </div>
            </div>

            <!-- 日期输入 -->
            <div style="margin-bottom: 1.5rem;">
                <label id="inputLabel" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">阳历日期</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div class="date-picker-group" style="flex: 1;">
                        <select id="inputYear"></select>
                        <select id="inputMonth"></select>
                        <select id="inputDay"></select>
                    </div>
                    <button class="today-btn" onclick="setToday()" style="padding: 0.5rem 0.8rem; background: rgba(212,175,55,0.2); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; cursor: pointer; white-space: nowrap; flex-shrink: 0;">今天</button>
                </div>
                <!-- 农历闰月选项 -->
                <div id="leapMonthOption" style="display: none; margin-top: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7); cursor: pointer;">
                        <input type="checkbox" id="isLeapMonth" style="width: auto; margin: 0;">
                        闰月
                        <span style="font-size: 0.75rem; color: rgba(255,255,255,0.4);">（如不确定，一般不勾选）</span>
                    </label>
                </div>
            </div>

            <button class="btn-primary" onclick="convertDate()">
                <i class="fas fa-exchange-alt"></i> 转换
            </button>

            <div id="result" class="result-display" style="display: none;">
                <div id="resultContent"></div>
            </div>

            <!-- 快捷日期 -->
            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <div style="font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 0.5rem;">常用查询</div>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    <button onclick="setToday()" class="quick-btn">今天</button>
                    <button onclick="setSpringFestival()" class="quick-btn">春节</button>
                    <button onclick="setMidAutumn()" class="quick-btn">中秋</button>
                    <button onclick="setDragonBoat()" class="quick-btn">端午</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 交互提示 -->
    <div class="hint-system">
        <i class="fas fa-lightbulb"></i> 选择日期，快速完成农历阳历转换
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-handle">
            <i class="fas fa-chevron-left" style="color: rgba(255,255,255,0.5);"></i>
        </div>
        <h3 style="color: #d4af37; margin-bottom: 1.5rem;">使用说明</h3>
        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.8;">
            <p style="margin-bottom: 1rem;"><strong>功能介绍：</strong></p>
            <p>在农历（阴历）和阳历（公历）之间相互转换。</p>
            
            <ul style="margin: 1rem 0; padding-left: 1rem;">
                <li style="margin-bottom: 0.5rem;">阳历转农历：输入公历日期</li>
                <li style="margin-bottom: 0.5rem;">农历转阳历：输入农历日期</li>
                <li style="margin-bottom: 0.5rem;">支持闰月处理</li>
            </ul>
            
            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">
                    <i class="fas fa-info-circle"></i> 支持1900-2100年范围
                </p>
            </div>
        </div>
    </aside>

    <style>
        .convert-direction-group {
            display: flex;
            gap: 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .direction-btn {
            flex: 1;
            padding: 0.8rem;
            background: rgba(255,255,255,0.05);
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .direction-btn:first-child {
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .direction-btn.active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.1));
            color: #d4af37;
        }
        .direction-btn i {
            margin-right: 0.3rem;
        }
        .quick-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            color: #d4af37;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
    <script src="../js/three-scenes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/page-specific/lunar-convert.js"></script>
    <script>
        const sceneManager = new SceneManager('canvas-container');
        sceneManager.createDaysDiffScene();
        sceneManager.animate();
        
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuOverlay = document.getElementById('menuOverlay');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
        }
    </script>
</body>
</html>
