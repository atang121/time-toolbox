<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相隔天数计算 - 时光工具箱</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="logo" style="font-family: 'Noto Serif SC', serif; font-size: 1.5rem; color: #d4af37;">
            <i class="fas fa-hourglass-half"></i> 时光工具箱
        </div>
        <button class="share-nav-btn" onclick="shareCurrentTool()" title="分享此工具">
            <i class="fas fa-share-alt"></i>
        </button>
        <button class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <button class="close-menu" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </button>
            <a href="../index.html" class="nav-link">首页</a>
            <a href="days-diff.html" class="nav-link active">相隔天数计算</a>
            <a href="date-calc.html" class="nav-link">日期加减推算</a>
            <a href="age-calc.html" class="nav-link">年龄计算</a>
            <a href="lunar-convert.html" class="nav-link">农历阳历转换</a>
            <a href="rmb-convert.html" class="nav-link">人民币小写改大写</a>
            <a href="short-url.html" class="nav-link">长链接转短链接</a>
            <a href="qrcode.html" class="nav-link">网址转二维码</a>
            <a href="image-convert.html" class="nav-link">图片格式转换</a>
            <a href="batch-rename.html" class="nav-link">图片或文件批量改名</a>
        </div>
        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    </nav>

    <!-- 主内容区域 -->
    <main style="position: relative; z-index: 10; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 5rem 1rem 2rem;">
        <div class="animate-fade-in form-container" style="max-width: 500px; width: 100%; padding: 2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size: clamp(1.3rem, 5vw, 2rem); margin-bottom: 0.5rem; color: #d4af37; font-family: 'Noto Serif SC', serif;">
                <i class="fas fa-calendar-alt"></i> 相隔天数计算
            </h1>
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem;">
                计算两个日期之间相隔的天数
            </p>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">开始日期</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div class="date-picker-group" style="flex: 1;">
                        <select id="startYear"></select>
                        <select id="startMonth"></select>
                        <select id="startDay"></select>
                    </div>
                    <button class="today-btn" onclick="setToday('start')" style="padding: 0.5rem 0.8rem; background: rgba(212,175,55,0.2); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; cursor: pointer; white-space: nowrap; flex-shrink: 0;">今天</button>
                </div>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">结束日期</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div class="date-picker-group" style="flex: 1;">
                        <select id="endYear"></select>
                        <select id="endMonth"></select>
                        <select id="endDay"></select>
                    </div>
                    <button class="today-btn" onclick="setToday('end')" style="padding: 0.5rem 0.8rem; background: rgba(212,175,55,0.2); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; cursor: pointer; white-space: nowrap; flex-shrink: 0;">今天</button>
                </div>
            </div>

            <button class="btn-primary" onclick="calculateDaysDiff()">
                <i class="fas fa-calculator"></i> 计算相隔天数
            </button>

            <div id="result" class="result-display" style="display: none;">
                <div id="resultContent"></div>
                <button class="share-result-btn" onclick="shareCurrentTool()">
                    <i class="fas fa-share-alt"></i> 分享此工具
                </button>
            </div>
        </div>
    </main>

    <!-- 交互提示 -->
    <div class="hint-system">
        <i class="fas fa-lightbulb"></i> 选择两个日期，计算它们之间相隔的天数
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-handle">
            <i class="fas fa-chevron-left" style="color: rgba(255,255,255,0.5);"></i>
        </div>
        <h3 style="color: #d4af37; margin-bottom: 1.5rem;">使用说明</h3>
        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.8;">
            <p style="margin-bottom: 1rem;"><strong>功能介绍：</strong></p>
            <p>计算任意两个日期之间相隔的天数，结果会显示：</p>
            <ul style="margin: 1rem 0; padding-left: 1rem;">
                <li>相隔的总天数</li>
                <li>换算成周数和天数</li>
                <li>换算成月数（约数）</li>
            </ul>
            <p style="margin-top: 1rem;"><strong>小提示：</strong></p>
            <p>点击"今天"按钮可快速设置为当前日期。</p>
        </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/three-scenes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/share.js"></script>
    <script src="../js/page-specific/days-diff.js"></script>
    <script>
        const sceneManager = new SceneManager('canvas-container');
        sceneManager.createDaysDiffScene();
        sceneManager.animate();
        
        // 初始化日期选择器
        initDatePicker('start', 1900, 2100);
        initDatePicker('end', 1900, 2100);
        setToday('start');
        setToday('end');
        
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuOverlay = document.getElementById('menuOverlay');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
        }
    </script>
</body>
</html>
