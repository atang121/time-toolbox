<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人民币小写改大写 - 时光工具箱</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="logo" style="font-family: 'Noto Serif SC', serif; font-size: 1.5rem; color: #d4af37;">
            <i class="fas fa-hourglass-half"></i> 时光工具箱
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <button class="close-menu" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </button>
            <a href="../index.html" class="nav-link">首页</a>
            <a href="days-diff.html" class="nav-link">相隔天数计算</a>
            <a href="date-calc.html" class="nav-link">日期加减推算</a>
            <a href="age-calc.html" class="nav-link">年龄计算</a>
            <a href="rmb-convert.html" class="nav-link active">人民币小写改大写</a>
            <a href="short-url.html" class="nav-link">长链接转短链接</a>
            <a href="qrcode.html" class="nav-link">网址转二维码</a>
            <a href="image-convert.html" class="nav-link">图片格式转换</a>
            <a href="batch-rename.html" class="nav-link">图片或文件批量改名</a>
        </div>
        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    </nav>

    <!-- 主内容区域 -->
    <main style="position: relative; z-index: 10; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 5rem 1rem 2rem;">
        <div class="animate-fade-in form-container" style="max-width: 550px; width: 100%; padding: 2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size: clamp(1.3rem, 5vw, 2rem); margin-bottom: 0.5rem; color: #d4af37; font-family: 'Noto Serif SC', serif;">
                <i class="fas fa-yen-sign"></i> 人民币小写改大写
            </h1>
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem;">
                将阿拉伯数字金额转换为中文大写
            </p>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">金额（元）</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #d4af37; font-size: 1.2rem;">¥</span>
                    <input type="text" id="amountInput" placeholder="请输入金额" 
                           style="padding-left: 2.5rem; font-size: 1.2rem;" 
                           oninput="formatInput(this)">
                </div>
            </div>

            <button class="btn-primary" onclick="convertToUpperCase()">
                <i class="fas fa-exchange-alt"></i> 转换大写
            </button>

            <div id="result" class="result-display" style="display: none;">
                <div id="resultContent"></div>
            </div>

            <!-- 快捷金额按钮 -->
            <div style="margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem;">
                <button onclick="setQuickAmount(100)" class="quick-btn">100</button>
                <button onclick="setQuickAmount(1000)" class="quick-btn">1,000</button>
                <button onclick="setQuickAmount(10000)" class="quick-btn">10,000</button>
                <button onclick="setQuickAmount(100000)" class="quick-btn">100,000</button>
                <button onclick="setQuickAmount(1000000)" class="quick-btn">1,000,000</button>
            </div>
        </div>
    </main>

    <!-- 交互提示 -->
    <div class="hint-system">
        <i class="fas fa-lightbulb"></i> 输入金额数字，自动转换为财务大写格式
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-handle">
            <i class="fas fa-chevron-left" style="color: rgba(255,255,255,0.5);"></i>
        </div>
        <h3 style="color: #d4af37; margin-bottom: 1.5rem;">使用说明</h3>
        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.8;">
            <p style="margin-bottom: 1rem;"><strong>功能介绍：</strong></p>
            <p>将阿拉伯数字金额转换为标准的中文大写金额，符合财务规范。</p>
            <ul style="margin: 1rem 0; padding-left: 1rem;">
                <li>支持小数点后两位（角、分）</li>
                <li>自动处理"零"的规范写法</li>
                <li>支持最大千亿级别金额</li>
            </ul>
            <p style="margin-top: 1rem;"><strong>大写对照：</strong></p>
            <div style="margin-top: 0.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.5);">
                0=零 1=壹 2=贰 3=叁 4=肆<br>
                5=伍 6=陆 7=柒 8=捌 9=玖
            </div>
        </div>
    </aside>

    <style>
        .quick-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            color: #d4af37;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/three-scenes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/page-specific/rmb-convert.js"></script>
    <script>
        const sceneManager = new SceneManager('canvas-container');
        sceneManager.createRmbScene();
        sceneManager.animate();
        
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuOverlay = document.getElementById('menuOverlay');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
        }
    </script>
</body>
</html>
