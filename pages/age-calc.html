<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年龄计算 - 时光工具箱</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="logo" style="font-family: 'Noto Serif SC', serif; font-size: 1.5rem; color: #d4af37;">
            <i class="fas fa-hourglass-half"></i> 时光工具箱
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <button class="close-menu" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </button>
            <a href="../index.html" class="nav-link">首页</a>
            <a href="days-diff.html" class="nav-link">相隔天数计算</a>
            <a href="date-calc.html" class="nav-link">日期加减推算</a>
            <a href="age-calc.html" class="nav-link active">年龄计算</a>
            <a href="lunar-convert.html" class="nav-link">农历阳历转换</a>
            <a href="rmb-convert.html" class="nav-link">人民币小写改大写</a>
            <a href="short-url.html" class="nav-link">长链接转短链接</a>
            <a href="qrcode.html" class="nav-link">网址转二维码</a>
            <a href="image-convert.html" class="nav-link">图片格式转换</a>
            <a href="batch-rename.html" class="nav-link">图片或文件批量改名</a>
        </div>
        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    </nav>

    <!-- 主内容区域 -->
    <main style="position: relative; z-index: 10; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 5rem 1rem 2rem;">
        <div class="animate-fade-in form-container" style="max-width: 500px; width: 100%; padding: 2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size: clamp(1.3rem, 5vw, 2rem); margin-bottom: 0.5rem; color: #d4af37; font-family: 'Noto Serif SC', serif;">
                <i class="fas fa-birthday-cake"></i> 年龄计算
            </h1>
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem;">
                根据出生日期精确计算年龄（支持阳历/农历）
            </p>

            <!-- 日历类型选择 -->
            <div style="margin-bottom: 1rem;">
                <div class="calendar-type-group">
                    <button type="button" class="calendar-btn active" data-type="solar" onclick="setCalendarType('solar')">
                        <i class="fas fa-sun"></i> 阳历生日
                    </button>
                    <button type="button" class="calendar-btn" data-type="lunar" onclick="setCalendarType('lunar')">
                        <i class="fas fa-moon"></i> 农历生日
                    </button>
                </div>
            </div>

            <div style="margin-bottom: 1rem;">
                <label id="birthLabel" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">出生日期（阳历）</label>
                <div class="date-picker-group">
                    <select id="birthYear"></select>
                    <select id="birthMonth"></select>
                    <select id="birthDay"></select>
                </div>
                <!-- 农历闰月选项 -->
                <div id="leapMonthOption" style="display: none; margin-top: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7); cursor: pointer;">
                        <input type="checkbox" id="isLeapMonth" style="width: auto; margin: 0;">
                        闰月
                    </label>
                </div>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7);">计算至（默认为今天）</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div class="date-picker-group" style="flex: 1;">
                        <select id="targetYear"></select>
                        <select id="targetMonth"></select>
                        <select id="targetDay"></select>
                    </div>
                    <button class="today-btn" onclick="setTodayTarget()" style="padding: 0.5rem 0.8rem; background: rgba(212,175,55,0.2); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; cursor: pointer; white-space: nowrap; flex-shrink: 0;">今天</button>
                </div>
            </div>

            <button class="btn-primary" onclick="calculateAge()">
                <i class="fas fa-user-clock"></i> 计算年龄
            </button>

            <div id="result" class="result-display" style="display: none;">
                <div id="resultContent"></div>
            </div>
        </div>
    </main>

    <!-- 交互提示 -->
    <div class="hint-system">
        <i class="fas fa-lightbulb"></i> 输入出生日期，精确计算年龄
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-handle">
            <i class="fas fa-chevron-left" style="color: rgba(255,255,255,0.5);"></i>
        </div>
        <h3 style="color: #d4af37; margin-bottom: 1.5rem;">使用说明</h3>
        <div style="font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.8;">
            <p style="margin-bottom: 1rem;"><strong>功能介绍：</strong></p>
            <p>根据出生日期计算精确年龄，结果显示：</p>
            <ul style="margin: 1rem 0; padding-left: 1rem;">
                <li>周岁年龄（年、月、日）</li>
                <li>已度过的总天数</li>
                <li>下次生日倒计时</li>
                <li>生肖和星座</li>
            </ul>
            <p style="margin-top: 1rem;"><strong>小提示：</strong></p>
            <p>可以指定计算至某个特定日期，用于计算历史年龄或未来年龄。</p>
        </div>
    </aside>

    <style>
        .calendar-type-group {
            display: flex;
            gap: 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .calendar-btn {
            flex: 1;
            padding: 0.7rem;
            background: rgba(255,255,255,0.05);
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .calendar-btn:first-child {
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .calendar-btn.active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.1));
            color: #d4af37;
        }
        .calendar-btn i {
            margin-right: 0.3rem;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <script src="../js/three-scenes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/page-specific/age-calc.js"></script>
    <script>
        const sceneManager = new SceneManager('canvas-container');
        sceneManager.createAgeCalcScene();
        sceneManager.animate();
        
        // 初始化日期选择器
        initDatePicker('birth', 1900, 2100);
        initDatePicker('target', 1900, 2100);
        setDefaultBirthDate();
        setTodayTarget();
        
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuOverlay = document.getElementById('menuOverlay');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
        }
    </script>
</body>
</html>
